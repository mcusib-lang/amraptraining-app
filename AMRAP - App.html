document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

i Condensed'; color:#8b88a8; margin-top:8px;\">Para personalizar tu app y tu racha. Se guarda solo en este dispositivo.<\u002Fdiv>\n              <input value=\"{{ nameInput }}\" oninput=\"{{ onNameInput }}\" placeholder=\"Tu nombre\" maxlength=\"18\" style=\"margin-top:18px; width:100%; padding:16px 18px; border-radius:14px; background:#121226; border:1.5px solid #2a2a48; color:#f3f1ec; font:600 17px/1 'Barlow Semi Condensed'; outline:none;\">\n              <div onclick=\"{{ onNextSetup }}\" style=\"{{ setupNextStyle }}\">CONTINUAR  →<\u002Fdiv>\n              <div style=\"flex:1;\"><\u002Fdiv>\n              <div style=\"text-align:center; font:500 11px/1.4 'Barlow Semi Condensed'; color:#5d5a78;\">Sin registro ni email · tus datos no salen del móvil<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- PASOS 1-3 · objetivo / nivel / frecuencia -->\n        <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"flex:1; display:flex; flex-direction:column; padding:48px 26px 26px;\">\n            <div onclick=\"{{ onPrevSetup }}\" style=\"font:600 13px/1 'Barlow Semi Condensed'; color:#7a7796; cursor:pointer; margin-bottom:18px;\">←  Atrás<\u002Fdiv>\n            <div style=\"font:600 11px/1 'Barlow Semi Condensed'; letter-spacing:.16em; color:#7a7796; text-transform:uppercase;\">Paso 2 de 4<\u002Fdiv>\n            <div style=\"font:400 32px/.95 'Bebas Neue'; margin-top:9px;\">¿QUÉ QUIERES<br>ENTRENAR?<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:9px; margin-top:20px;\">\n              <sc-for list=\"{{ goalOptions }}\" as=\"o\" hint-placeholder-count=\"5\">\n                <div onclick=\"{{ o.onTap }}\" style=\"{{ o.style }}\">\n                  <div><div style=\"font:600 15px/1 'Barlow Semi Condensed'; color:#f3f1ec;\">{{ o.label }}<\u002Fdiv><div style=\"font:500 11px/1 'Barlow Semi Condensed'; color:#8b88a8; margin-top:4px;\">{{ o.sub }}<\u002Fdi div style=\"flex:1;\"><\u002Fdiv>\n            <div onclick=\"{{ onNextSetup }}\" style=\"{{ setupNextStyle }}\">CONTINUAR  →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"flex:1; display:flex; flex-direction:column; padding:48px 26px 26px;\">\n            <div onclick=\"{{ onPrevSetup }}\" style=\"font:600 13px/1 'Barlow Semi Condensed'; color:#7a7796; cursor:pointer; margin-bottom:18px;\">←  Atrás<\u002Fdiv>\n            <div style=\"font:600 11px/1 'Barlow Semi Condensed'; letter-spacing:.16em; color:#7a7796; text-transform:uppercase;\">Paso 4 de 4<\u002Fdiv>\n            <div style=\"font:400 32px/.95 'Bebas Neue'; margin-top:9px;\">TU COMPROMISO<\u002Fdiv>\n            <div style=\"font:600 12px/1 'Barlow Semi Condensed'; letter-spacing:.06em; color:#8b88a8; margin:22px 0 9px;\">DÍAS POR SEMANA<\u002Fdiv>\n            <div style=\"display:flex; gap:8px;\">\n              <sc-for list=\"{{ dayOptions }}\" as=\"d\" hint-placeholder-count=\"4\"><div onclick=\"{{ d.onTap }}\" style=\"{{ d.style }}\">{{ d.label }}<\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font:600 12px/1 'Barlow Semi Condensed'; letter-spacing:.06em; color:#8b88a8; margin:22px 0 9px;\">DURANTE CUÁNTAS SEMANAS<\u002Fdiv>\n            <div style=\"display:flex; gap:8px;\">\n              <sc-for list=\"{{ weekOptions }}\" as=\"w\" hint-placeholder-count=\"4\"><div onclick=\"{{ w.onTap }}\" style=\"{{ w.style }}\">{{ w.label }}<\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:24px; padding:15px 17px; border-radius:14px; background:#101022; border:1px solid #ffffff10;\">\n              <div style=\"font:600 10px/1 'Barlow Semi Condensed'; letter-spacing:.12em; color:#4f8cff; margin-bottom:7px;\">TU PLAN<\u002Fdiv>\n              <div style=\"font:500 13px/1.4 'Barlow Semi Condensed'; color:#d8d3e8;\">{{ planSummary }}<\ \"font:400 46px/.9 'Bebas Neue'; margin-top:12px;\">¿CÓMO HA<br>IDO?<\u002Fdiv>\n        <div style=\"font:600 10px/1 'Barlow Semi Condensed'; letter-spacing:.12em; color:#7a7796; margin:24px 0 12px;\">ESFUERZO PERCIBIDO (RPE)<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:11px;\">\n          <sc-for list=\"{{ rpes }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ r.onSelect }}\" style=\"{{ r.style }}\">\n              <span style=\"font-size:26px;\">{{ r.emoji }}<\u002Fspan>\n              <div><div style=\"font:600 14px/1 'Barlow Semi Condensed'; color:#f3f1ec;\">{{ r.label }}<\u002Fdiv><div style=\"font:500 12px/1 'Barlow Semi Condensed'; color:#8b88a8; margin-top:3px;\">{{ r.sub }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasRpe }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px; padding:13px 15px; border-radius:13px; background:#0e1a14; border:1px solid #22c55e33;\">\n            <div style=\"font:600 10px/1 'Barlow Semi Condensed'; letter-spacing:.1em; color:#22c55e; margin-bottom:5px;\">SUGERENCIA · NUNCA OBLIGA<\u002Fdiv>\n            <div style=\"font:500 12px/1.45 'Barlow Semi Condensed'; color:#d8d3e8;\">{{ rpeSuggestion }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <div onclick=\"{{ onSave }}\" style=\"{{ saveStyle }}\">GUARDAR Y CERRAR<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ░░ DONE ░░ -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"ph\" style=\"flex:1; display:flex; flex-direction:column; padding:34px 24px 26px; align-items:center; text-align:center;\">\n        <div style=\"width:74px; height:74px; border-radius:50%; background:#22c55e1a; border:1.5px solid #22c55e; display:flex; align-items:center; justify-content:center; font-size:34px; margin-top:14px;\">✓<\u002Fdiv>\n        <div style=\"font:400 50px/.9 'Bebas Neue'; margin-top:20px;\">¡SESIÓN<br>GUARDADA!<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:9px; margin-top:18px; padding:10px 18px; border-radius:22px; background:#f5a52416; border:1px solid #f5a52440;\">\n          <span style=\"font-size:20px;\">🔥<\u002Fspan><span style=\"font:400 30px/1 'Bebas Neue'; color:#f5a524;\">{{ streak }}<\u002Fspan>\n          <span style=\"font:600 11px/1.1 'Barlow Semi Condensed'; letter-spacing:.06em; color:#caa86a; text-align:left;\">DÍAS<br>DE RACHA<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:10px; margin-top:24px; width:100%;\">\n          <div style=\"flex:1; padding:16px 0; border-radius:14px; background:#121226; border:1px solid #ffffff0d;\"><div style=\"font:400 34px/1 'Bebas Neue'; color:#4f8cff;\">{{ rounds }}<\u002Fdiv><div style=\"font:600 9px/1 'Barlow Semi Condensed'; letter-spacing:.1em; color:#7a7796; margin-top:4px;\">RONDAS<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; padding:16px 0; border-radius:14px; background:#121226; border:1px solid #ffffff0d;\"><div style=\"font:400 34px/1 'Bebas Neue'; color:#a855f7;\">28'<\u002Fdiv><div style=\"font:600 9px/1 'Barlow Semi Condensed'; letter-spacing:.1em; color:#7a7796; margin-top:4px;\">DURACIÓN<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; padding:16px 0; border-radius:14px; background:#121226; border:1px solid #ffffff0d;\"><div style=\"font:400 34px/1 'Bebas Neue'; color:#22c55e;\">{{ doneRpe }}<\u002Fdiv><div style=\"font:600 9px/1 'Barlow Semi Condensed'; letter-spacing:.1em; color:#7a7796; margin-top:4px;\">ESFUERZO<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:18px; padding:13px 16px; border-radius:13px; background:#101022; border:1px solid #ffffff0d; width:100%;\">\n          <div style=\"font:500 12px/1.45 'Barlow Semi Condensed'; color:#a7a4c2;\">💧 Bebe agua y, si entrenas en grupo, tu racha ya es visible para tus amigos.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <div onclick=\"{{ onRestart }}\" style=\"margin-top:20px; padding:16px; border-radius:14px; border:1px solid #ffffff1f; text-align:center; font:600 13px/1 'Barlow Semi Condensed'; letter-spacing:.05em; color:#e6e3f2; cursor:pointer; width:100%;\">VOLVER AL INICIO<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ░░ FICHA DE EJERCICIO (overlay) ░░ -->\n    <sc-if value=\"{{ hasFicha }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onCloseFicha }}\" style=\"position:absolute; inset:0; z-index:40; background:#04040baa; backdrop-filter:blur(3px); display:flex; flex-direction:column; justify-content:flex-end;\">\n        <div onclick=\"{{ stop }}\" style=\"background:linear-gradient(180deg,#101022,#0a0a14); border-top-left-radius:26px; border-top-right-radius:26px; border:1px solid #ffffff12; border-bottom:none; padding:10px 22px 24px; max-height:92%; overflow-y:auto; animation:sheetUp .26s cubic-bezier(.2,.8,.2,1);\">\n          <div style=\"width:38px; height:4px; border-radius:3px; background:#ffffff22; margin:0 auto 16px;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:12px;\">\n            <div>\n              <div style=\"font:600 10px/1 'Barlow Semi Condensed'; letter-spacing:.16em; color:{{ fichaAccent }}; text-transform:uppercase;\">{{ fichaBlockLabel }}<\u002Fdiv>\n              <div style=\"font:400 34px/.92 'Bebas Neue'; margin-top:7px;\">{{ fichaName }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ onCloseFicha }}\" style=\"width:34px; height:34px; flex-shrink:0; border-radius:50%; border:1px solid #ffffff18; display:flex; align-items:center; justify-content:center; font:300 22px/1 system-ui; color:#8b88a8; cursor:pointer;\">×<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:7px; margin-top:11px; flex-wrap:wrap;\">\n            <span style=\"padding:5px 12px; border-radius:18px; background:{{ fichaAccentBg }}; border:1px solid {{ fichaAccentBd }}; font:600 12px/1 'Barlow Semi Condensed'; color:{{ fichaAccent }};\">{{ fichaDose }}<\u002Fspan>\n            <span style=\"padding:5px 12px; border-radius:18px; border:1px solid #ffffff14; font:600 12px/1 'Barlow Semi Condensed'; color:#8b88a8;\">{{ fichaMuscle }}<\u002Fspan>\n            <span style=\"padding:5px 12px; border-radius:18px; border:1px solid #ffffff14; font:600 12px/1 'Barlow Semi Condensed'; color:#8b88a8;\">{{ fichaMaterial }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"position:relative; margin:15px 0; border-radius:18px; background:linear-gradient(180deg,#14142a,#101022); border:1px solid #ffffff10; overflow:hidden;\">\n            <canvas data-ex=\"{{ fichaPose }}\" style=\"width:100%; height:220px; display:block;\"><\u002Fcanvas>\n            <div style=\"position:absolute; bottom:11px; left:0; right:0; text-align:center; font:600 9px/1 'Barlow Semi Condensed'; letter-spacing:.14em; color:#6f6c8e;\">TÉCNICA · A RITMO LENTO<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:14px 16px; border-radius:14px; background:#1a1410; border:1px solid #f5a52433;\">\n            <div style=\"font:600 10px/1 'Barlow Semi Condensed'; letter-spacing:.12em; color:#f5a524; margin-bottom:9px;\">⚠ CLAVES DE TÉCNICA<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:7px;\">\n              <sc-for list=\"{{ fichaErrors }}\" as=\"e\" hint-placeholder-count=\"2\">\n                <div style=\"font:500 12px/1.4 'Barlow Semi Condensed'; color:#d8d3e8;\">· {{ e.t }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div onclick=\"{{ onCloseFicha }}\" style=\"margin-top:16px; padding:15px; border-radius:14px; background:{{ fichaAccent }}; text-align:center; font:600 13px/1 'Barlow Semi Condensed'; letter-spacing:.05em; color:#04132e; cursor:pointer;\">ENTENDIDO<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem('amrap_fn') || '{}'); } catch (e) {}\n    this.saved = saved;\n    // ░░ LIBRERÍA COMPLETA DE EJERCICIOS ░░\n    // Cada ejercicio: figura animada (pose), bloque, grupo muscular, material y errores.\n    this.LIB = [\n      // — Calentamiento (movilidad dinámica) —\n      { id:'w-legswing',  name:'Balanceo de pierna',     pose:'legswing',     block:'warmup',   sec:30, muscle:'Cadera · Isquios',     material:'Peso corporal', errors:['Controla el balanceo, no rebotes','Mantén el tronco estable'] },\n      { id:'w-squat',     name:'Sentadillas sin peso',   pose:'squat',        block:'warmup',   sec:40, muscle:'Cuádriceps · Glúteo',  material:'Peso corporal', errors:['Talones pegados al suelo','Rodillas alineadas con los pies'] },\n      { id:'w-lunge',     name:'Zancadas caminando',     pose:'lunge',        block:'warmup',   sec:30, muscle:'Glúteo · Cuádriceps',  material:'Peso corporal', errors:['Paso amplio y estable','La rodilla no pasa la punta'] },\n      { id:'w-highknees', name:'Rodillas altas',         pose:'highknees',    block:'warmup',   sec:30, muscle:'Cardio · Core',        material:'Peso corporal', errors:['Lleva las rodillas a la cadera','Los brazos acompañan'] },\n      { id:'w-calf',      name:'Elevaciones de talón',   pose:'calfraise',    block:'warmup',   sec:30, muscle:'Gemelos',              material:'Peso corporal', errors:['Sube despacio','Pausa arriba 1 s'] },\n      // — AMRAP (banco principal) —\n      { id:'squat',         name:'Sentadilla sumo',     pose:'squat',        block:'amrap', reps:'12 reps',     muscle:'Cuádriceps · Glúteo', material:'Mancuerna',     errors:['Las rodillas no entran hacia dentro','El pecho no cae hacia delante'] },\n      { id:'lunge',         name:'Zancada trasera',     pose:'lunge',        block:'amrap', reps:'10 / pierna', muscle:'Glúteo · Cuádriceps', material:'Mancuerna',     errors:['La rodilla no pasa la punta del pie','Mantén el tronco erguido'] },\n      { id:'glutebridge',   name:'Puente de glúteo',    pose:'glutebridge',  block:'amrap', reps:'15 reps',     muscle:'Glúteo · Isquios',    material:'Peso corporal', errors:['Aprieta el glúteo arriba','No arquees la lumbar'] },\n      { id:'jack',          name:'Saltos de tijera',    pose:'jack',         block:'amrap', reps:'30 reps',     muscle:'Cardio · Full body',  material:'Peso corporal', errors:['Aterriza suave, rodillas blandas','Brazos completos por encima'] },\n      { id:'pushup',        name:'Flexiones',           pose:'pushup',       block:'amrap', reps:'8 reps',      muscle:'Pecho · Tríceps',     material:'Peso corporal', errors:['Cuerpo en línea recta','Codos a ~45°, no abiertos'] },\n      { id:'shoulderpress', name:'Press de hombros',    pose:'shoulderpress',block:'amrap', reps:'10 reps',     muscle:'Hombro · Tríceps',    material:'Mancuerna',     errors:['No arquees la lumbar','Recorrido completo arriba'] },\n      { id:'bicepcurl',     name:'Curl de bíceps',      pose:'bicepcurl',    block:'amrap', reps:'12 reps',     muscle:'Bíceps',              material:'Mancuerna',     errors:['Codos pegados al cuerpo','No balancees el torso'] },\n      { id:'row',           name:'Remo con mancuerna',  pose:'row',          block:'amrap', reps:'12 reps',     muscle:'Espalda · Bíceps',    material:'Mancuerna',     errors:['Lleva el codo hacia atrás','Espalda recta, no encorvada'] },\n      { id:'rdl',           name:'Peso muerto rumano',  pose:'rdl',          block:'amrap', reps:'12 reps',     muscle:'Isquios · Glúteo',    material:'Mancuerna',     errors:['Bisagra de cadera, no sentadilla','Espalda neutra'] },\n      { id:'lateralraise',  name:'Elevación lateral',   pose:'lateralraise', block:'amrap', reps:'12 reps',     muscle:'Hombro',              material:'Mancuerna',     errors:['Sube hasta la altura del hombro','No uses impulso'] },\n      { id:'crunch',        name:'Crunch abdominal',    pose:'crunch',       block:'amrap', reps:'15 reps',     muscle:'Core · Abdomen',      material:'Esterilla',     errors:['No tires del cuello','Sube con el abdomen'] },\n      { id:'legraise',      name:'Elevación de piernas',pose:'legraise',     block:'amrap', reps:'12 reps',     muscle:'Core inferior',       material:'Esterilla',     errors:['Lumbar pegada al suelo','Baja controlando'] },\n      { id:'plank',         name:'Plancha',             pose:'plank',        block:'amrap', reps:'40 seg',      muscle:'Core · Hombro',       material:'Peso corporal', errors:['Cadera ni alta ni baja','Aprieta abdomen y glúteo'] },\n      { id:'climber',       name:'Escaladores',         pose:'climber',      block:'amrap', reps:'30 reps',     muscle:'Core · Cardio',       material:'Peso corporal', errors:['Cadera baja y estable','Ritmo constante'] },\n      // — Enfriamiento (estiramiento y movilidad) —\n      { id:'c-catcow', name:'Gato–Vaca',                  pose:'catcow',     block:'cooldown', sec:30, muscle:'Movilidad de columna', material:'Esterilla',     errors:['Mueve vértebra a vértebra','Acompaña con la respiración'] },\n      { id:'c-cobra',  name:'Cobra a Niño',               pose:'cobra',      block:'cooldown', sec:30, muscle:'Abdomen · Espalda',    material:'Esterilla',     errors:['Abre el pecho sin forzar','Hombros lejos de las orejas'] },\n      { id:'c-quad',   name:'Estiramiento de cuádriceps', pose:'quadstretch',block:'cooldown', sec:30, muscle:'Cuádriceps',           material:'Peso corporal', errors:['Mantén las rodillas juntas','No arquees la lumbar'] },\n      { id:'c-child',  name:'Postura del niño',           pose:'childpose',  block:'cooldown', this.onSkipMove, onWarmupNext: this.onWarmupNext,\n\n      // demo\n      demoNum: s.demoIdx + 1, demoTotal: this.EXS.length,\n      demoName: ex.name, demoReps: ex.reps, demoMuscle: ex.muscle, demoEx: ex.ex,\n      demoErrors, demoDots,\n      demoNextLabel: isLastDemo ? 'EMPEZAR AMRAP  ▶' : 'SIGUIENTE  →',\n      demoPrevStyle: 'width:54px; padding:16px 0; border-radius:14px; border:1px solid #ffffff1f; text-align:center; font:600 16px/1 system-ui; color:'+(s.demoIdx>0?'#e6e3f2':'#3a3a52')+'; cursor:'+(s.demoIdx>0?'pointer':'default')+';',\n      onDemoPrev: this.onDemoPrev, onDemoNext: this.onDemoNext,\n\n      // amrap\n      amrapClock: this.fmt(s.amrapLeft),\n      amrapPct: Math.round((1 - s.amrapLeft / s.amrapTotal) * 100),\n      amrapStatus: s.amrapLeft===0 ? 'TIEMPO COMPLETADO' : (s.amrapRunning ? 'EN MARCHA' : 'EN PAUSA'),\n      liveColor: s.amrapRunning ? '#4f8cff' : '#7a7796',\n      amrapToggleLabel: s.amrapRunning ? '⏸  Pausar' : '▶  Reanudar',\n      bestRounds: Math.max(s.bestRounds, s.rounds),\n      circuit: this.EXS.map(e => ({ name: e.name, reps: e.reps, onTap: () => this.openFicha(e) })),\n      onAddRound: this.onAddRound, onSubRound: this.onSubRound,\n      onToggleAmrap: this.onToggleAmrap, onFinishAmrap: this.onFinishAmrap,\n\n      // cooldown\n      cdName: s.cdDone ? 'Estiramientos completos ✓' : curC.name,\n      cdClock: s.cdDone ? '0:00' : this.fmt(s.cdLeft),\n      cdPct: Math.round((s.cdLeft / curC.sec) * 100),\n      cdList, onFinishCooldown: this.onFinishCooldown,\n\n      // rpe\n      rpes, hasRpe: !!s.rpe, rpeSuggestion: rpeSug,\n      onSave: this.onSave,\n      saveStyle: 'margin-top:18px; padding:17px; border-radius:15px; text-align:center; font:600 14px/1 \\'Barlow Semi Condensed\\'; letter-spacing:.05em; cursor:pointer; '+(s.rpe ? 'background:#22c55e; color:#04210f; box-shadow:0 10px 30px -8px #22c55e55;' : 'background:#15152a; color:#5d5a78; border:1px solid #ffffff12;')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody>
